version: '3.8'

services:
  golab:
    build: .
    ports:
      - "3000:3000"
    environment:
      - GOLAB_DB_HOST=db
      - GOLAB_DB_PORT=5432
      - GOLAB_DB_NAME=golab
      - GOLAB_DB_USER=golab
      - GOLAB_DB_PASSWORD=golab-dev
      - GOLAB_DB_SSLMODE=disable
      - GOLAB_SECRET=dev-secret-change-in-production
      # AES-256 key (base64, 32 bytes) for /opt/backups encryption.
      # Leave empty on first start: the app generates a key and
      # prints it once in the container logs. Copy that value here
      # and restart. Losing this key means losing every encrypted
      # backup - it cannot be reconstructed from the files alone.
      - GOLAB_BACKUP_KEY=
    # Persist uploads across `docker-compose build` rebuilds. Without
    # this volume, every rebuild destroyed user avatars and post
    # images because they lived inside the ephemeral container fs.
    #
    # golab-backups holds manual pg_dump files created via the admin
    # "Database" UI (Sprint 13). Mounted at /opt/backups inside the
    # container; production can override to a bind mount of the host
    # /opt/backups directory via a compose override file.
    volumes:
      - golab-uploads:/app/web/static/uploads
      - golab-backups:/opt/backups
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=golab
      - POSTGRES_USER=golab
      - POSTGRES_PASSWORD=golab-dev
    volumes:
      - golab-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  golab-data:
  golab-uploads:
  golab-backups:
