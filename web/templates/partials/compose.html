{{ define "compose.html" }}
{{ $channels := .Channels }}
{{ $selected := .SelectedChannelID }}
<form id="compose-form"
      class="compose-box compose-quill"
      x-data="composeEditor()"
      x-init="init()"
      @submit.prevent="submit()">

  <!-- Quill is mounted here at init(). The toolbar and contenteditable
       get injected by Quill; we only provide the container. -->
  <div x-ref="editor" class="compose-editor"></div>

  <div class="compose-footer">
    <span class="compose-count" :class="{ over: charCount > max }">
      <span x-text="charCount">0</span> / 5000
    </span>

    {{ if $channels }}
    <select class="compose-select" name="channel_id" x-ref="channelSelect">
      <option value="">Your timeline</option>
      {{ range $channels }}
      <option value="{{ .ID }}"{{ if eq .ID $selected }} selected{{ end }}>#{{ .Slug }}</option>
      {{ end }}
    </select>
    {{ else if $selected }}
    <input type="hidden" name="channel_id" value="{{ $selected }}">
    {{ end }}

    <button type="submit" class="btn btn-primary btn-sm press-effect"
            :disabled="charCount < 1 || charCount > max || submitting">
      <span x-show="!submitting">Post</span>
      <span x-show="submitting" class="btn-spinner" x-cloak>
        <svg class="spin" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" stroke="currentColor"
                  stroke-width="3" fill="none" stroke-dasharray="31 31"/>
        </svg>
      </span>
    </button>
  </div>
</form>
{{ end }}
